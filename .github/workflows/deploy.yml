name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-main
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          docker build -t ${{ secrets.ECR_REPO }}:${{ github.sha }} .
          docker push ${{ secrets.ECR_REPO }}:${{ github.sha }}

      - name: Wait for SSM agent
        run: |
          for i in $(seq 1 20); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null)
            [ "$STATUS" = "Online" ] && break
            echo "SSM agent not ready yet (status: ${STATUS:-none}), retrying..."
            sleep 5
          done
          [ "$STATUS" = "Online" ] || { echo "Instance ${{ secrets.EC2_INSTANCE_ID }} never came online in SSM — is it running?"; exit 1; }

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name AWS-RunShellScript \
            --parameters commands="[
              \"aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REPO }}\",
              \"docker pull ${{ secrets.ECR_REPO }}:${{ github.sha }}\",
              \"docker stop sentinel-app || true\",
              \"docker rm   sentinel-app || true\",
              \"docker run -d --name sentinel-app --restart unless-stopped -p 8000:8000 --log-driver awslogs --log-opt awslogs-region=${{ secrets.AWS_REGION }} --log-opt awslogs-group=/sentinel/app --log-opt awslogs-stream=sentinel-app -e HEARTBEAT_ENABLED=true ${{ secrets.ECR_REPO }}:${{ github.sha }}\",
              \"docker image prune -af --filter until=24h\"
            ]" \
            --query Command.CommandId \
            --output text)

          echo "SSM CommandId: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query StatusDetails \
            --output text)

          echo "SSM status: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            echo "Deploy failed — SSM status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query '[StandardOutputContent,StandardErrorContent]' \
              --output text
            exit 1
          fi
